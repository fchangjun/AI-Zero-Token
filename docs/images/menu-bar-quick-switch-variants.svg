      <rect x="338" y="412" width="138" height="48" rx="14" fill="#fff" stroke="#D0D5DD"/>
      <text class="sf t14 w800 softText" x="363" y="442">切换 Codex</text>

      <rect x="24" y="480" width="452" height="54" rx="16" fill="#F8FAFC" stroke="#EAECF0"/>
      <text class="sf t12 w800 muted" x="48" y="512">最近请求</text>
      <rect x="138" y="494" width="54" height="26" rx="13" fill="#DCFCE7"/>
      <text class="sf t12 w800" x="155" y="511" fill="#15803D">200</text>
      <text class="sf t13 w700 softText" x="212" y="512">POST /v1/chat/completions · 868ms</text>
    </g>
