  <g transform="translate(1190 898)">
    <rect width="476" height="296" rx="26" fill="#FFFFFF" fill-opacity="0.72" stroke="#EAECF0" filter="url(#soft)"/>
    <text class="sf t18 w800 ink" x="34" y="48">推荐落地顺序</text>
    <circle cx="44" cy="86" r="12" fill="#101828"/><text class="sf t12 w800 white" x="41" y="90">1</text>
    <text class="sf t14 w800 ink" x="70" y="91">先做方案 A</text>
    <text class="sf t13 w600 muted" x="70" y="114">Electron Tray 原生菜单，风险最低。</text>
    <circle cx="44" cy="152" r="12" fill="#344054"/><text class="sf t12 w800 white" x="40" y="156">2</text>
    <text class="sf t14 w800 ink" x="70" y="157">再增强成方案 B</text>
    <text class="sf t13 w600 muted" x="70" y="180">加入额度、最近请求、健康状态。</text>
    <circle cx="44" cy="218" r="12" fill="#667085"/><text class="sf t12 w800 white" x="40" y="222">3</text>
    <text class="sf t14 w800 ink" x="70" y="223">账号多时补方案 C</text>
    <text class="sf t13 w600 muted" x="70" y="246">搜索和键盘操作解决长列表问题。</text>
  </g>
</svg>
