<svg width="1800" height="1400" viewBox="0 0 1800 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFC"/>
      <stop offset="0.52" stop-color="#EEF3F7"/>
      <stop offset="1" stop-color="#F7EEE8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#101828" flood-opacity="0.16"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#101828" flood-opacity="0.11"/>
    </filter>
    <style>
      .sf{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .ink{fill:#101828}.softText{fill:#344054}.muted{fill:#667085}.faint{fill:#98A2B3}.white{fill:#fff}
      .t11{font-size:11px}.t12{font-size:12px}.t13{font-size:13px}.t14{font-size:14px}.t15{font-size:15px}.t16{font-size:16px}.t18{font-size:18px}.t22{font-size:22px}.t28{font-size:28px}
      .w500{font-weight:500}.w600{font-weight:600}.w700{font-weight:700}.w800{font-weight:800}
    </style>
  </defs>

  <rect width="1800" height="1400" fill="url(#bg)"/>
  <rect x="0" y="0" width="1800" height="36" fill="#F8FAFC" fill-opacity="0.82"/>
  <line x1="0" y1="35.5" x2="1800" y2="35.5" stroke="#D0D5DD"/>
  <text class="sf t14 w700 ink" x="22" y="23">AI Zero Token</text>
  <text class="sf t14 w500 softText" x="145" y="23">文件</text>
  <text class="sf t14 w500 softText" x="192" y="23">编辑</text>
  <text class="sf t14 w500 softText" x="238" y="23">窗口</text>
  <text class="sf t13 w700 softText" x="1512" y="23">5月8日 周五 15:58</text>
  <rect x="1438" y="4" width="50" height="28" rx="8" fill="#101828"/>
  <circle cx="1454" cy="18" r="5" fill="#22C55E"/>
  <path d="M1467 13L1475 18L1467 23V13Z" fill="#fff"/>

  <text class="sf t28 w800 ink" x="80" y="96">菜单栏快速切换：三种正式视觉方案</text>
  <text class="sf t15 w600 muted" x="80" y="126">围绕同一功能目标：快速查看网关/Codex 状态、切换账号、同步应用、重启网关。</text>

  <!-- Variant A -->
  <g transform="translate(86 180)">
