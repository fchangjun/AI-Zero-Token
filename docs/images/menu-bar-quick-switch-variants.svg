      <text class="sf t12 w700 muted" x="324" y="346">2 分钟前同步</text>

      <text class="sf t13 w800 muted" x="24" y="394">快速动作</text>
      <rect x="24" y="412" width="138" height="48" rx="14" fill="#101828"/>
