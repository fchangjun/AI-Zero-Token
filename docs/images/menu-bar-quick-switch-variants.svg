      <rect width="720" height="410" rx="24" fill="#FCFCFD" stroke="#EAECF0"/>
      <path d="M412 0L430 -22L448 0H412Z" fill="#FCFCFD"/>
      <rect x="28" y="28" width="664" height="58" rx="16" fill="#F8FAFC" stroke="#D0D5DD"/>
      <circle cx="56" cy="57" r="8" stroke="#667085" stroke-width="2"/>
      <path d="M62 63L70 71" stroke="#667085" stroke-width="2" stroke-linecap="round"/>
