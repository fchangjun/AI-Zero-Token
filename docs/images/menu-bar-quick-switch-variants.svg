      <path d="M252 0L270 -22L288 0H252Z" fill="#FCFCFD"/>
      <rect x="18" y="18" width="384" height="62" rx="14" fill="#101828"/>
      <rect x="34" y="32" width="34" height="34" rx="8" fill="#fff"/>
      <path d="M43 43H55M43 52H60M60 39L68 49L60 59L52 49L60 39Z" stroke="#101828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="sf t16 w800 white" x="82" y="44">AI Zero Token</text>
      <text class="sf t12 w700" x="82" y="63" fill="#D0D5DD">网关 8799 · 3 个账号</text>
      <circle cx="370" cy="41" r="5.5" fill="#22C55E"/>
      <text class="sf t12 w800" x="340" y="62" fill="#86EFAC">运行中</text>

      <text class="sf t12 w800 muted" x="24" y="112">网关账号</text>
      <rect x="18" y="126" width="384" height="48" rx="12" fill="#F8FAFC"/>
      <path d="M38 149L46 157L60 141" stroke="#16A34A" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="sf t14 w800 ink" x="76" y="156">work@example.com</text>
      <rect x="300" y="137" width="78" height="26" rx="13" fill="#DCFCE7"/>
      <text class="sf t12 w800" x="320" y="154" fill="#15803D">使用中</text>
      <rect x="18" y="178" width="384" height="48" rx="12" fill="#fff"/>
      <text class="sf t14 w700 softText" x="76" y="208">backup@example.com</text>
      <text class="sf t13 w700 muted" x="318" y="208">切换</text>

      <line x1="18" y1="244" x2="402" y2="244" stroke="#EAECF0"/>
      <text class="sf t12 w800 muted" x="24" y="276">Codex 账号</text>
      <rect x="18" y="290" width="384" height="48" rx="12" fill="#F8FAFC"/>
      <path d="M38 313L46 321L60 305" stroke="#3538CD" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="sf t14 w800 ink" x="76" y="320">backup@example.com</text>
      <rect x="292" y="301" width="86" height="26" rx="13" fill="#E0EAFF"/>
      <text class="sf t12 w800" x="310" y="318" fill="#3538CD">Codex</text>
      <rect x="18" y="342" width="384" height="48" rx="12" fill="#fff"/>
      <text class="sf t14 w700 softText" x="76" y="372">work@example.com</text>
      <text class="sf t13 w700 muted" x="318" y="372">应用</text>

      <line x1="18" y1="408" x2="402" y2="408" stroke="#EAECF0"/>
      <text class="sf t14 w800 ink" x="42" y="444">同时应用选中账号</text>
      <path d="M350 435L360 445L350 455" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
