      <rect x="602" y="43" width="60" height="28" rx="8" fill="#fff" stroke="#D0D5DD"/>
      <text class="sf t12 w800 muted" x="618" y="61">⌘ K</text>

      <text class="sf t12 w800 muted" x="34" y="122">建议操作</text>
      <rect x="28" y="140" width="664" height="64" rx="16" fill="#101828"/>
      <circle cx="60" cy="172" r="15" fill="#22C55E"/>
      <path d="M53 172L58 177L68 166" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="sf t15 w800 white" x="88" y="166">让 Codex 跟随当前网关账号</text>
      <text class="sf t12 w600" x="88" y="186" fill="#D0D5DD">work@example.com 将同时作为网关与 Codex 账号</text>
      <text class="sf t12 w800" x="606" y="176" fill="#A7F3D0">Enter</text>

      <text class="sf t12 w800 muted" x="34" y="236">账号</text>
      <rect x="28" y="254" width="664" height="56" rx="14" fill="#fff" stroke="#EAECF0"/>
      <circle cx="58" cy="282" r="15" fill="#E0F2FE"/>
      <text class="sf t12 w800" x="52" y="286" fill="#0369A1">W</text>
      <text class="sf t14 w800 ink" x="88" y="277">work@example.com</text>
      <text class="sf t12 w600 muted" x="88" y="295">网关使用中 · 额度健康 · Plus</text>
      <rect x="486" y="269" width="62" height="26" rx="13" fill="#DCFCE7"/>
      <text class="sf t12 w800" x="505" y="286" fill="#15803D">网关</text>
      <rect x="560" y="269" width="82" height="26" rx="13" fill="#EEF4FF"/>
      <text class="sf t12 w800" x="578" y="286" fill="#3538CD">应用 Codex</text>

      <rect x="28" y="318" width="664" height="56" rx="14" fill="#fff" stroke="#EAECF0"/>
      <circle cx="58" cy="346" r="15" fill="#FFF7ED"/>
      <text class="sf t12 w800" x="53" y="350" fill="#C2410C">B</text>
      <text class="sf t14 w800 ink" x="88" y="341">backup@example.com</text>
      <text class="sf t12 w600 muted" x="88" y="359">Codex 当前 · 额度 62% · Team</text>
      <rect x="486" y="333" width="82" height="26" rx="13" fill="#F2F4F7"/>
      <text class="sf t12 w800 muted" x="504" y="350">切换网关</text>
      <rect x="580" y="333" width="62" height="26" rx="13" fill="#E0EAFF"/>
      <text class="sf t12 w800" x="596" y="350" fill="#3538CD">Codex</text>
