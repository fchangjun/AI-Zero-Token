      <rect width="500" height="560" rx="24" fill="#FCFCFD" stroke="#EAECF0"/>
      <path d="M306 0L324 -22L342 0H306Z" fill="#FCFCFD"/>
      <rect x="24" y="24" width="452" height="82" rx="18" fill="#101828"/>
